{{define "notification"}} {{template "layout.start" .}}
<h1>{{.Copy.Title}}</h1>
<p class="intro">{{.Copy.Intro}}</p>

{{if .Details}}
<table
  role="presentation"
  class="details"
  width="100%"
  cellpadding="0"
  cellspacing="0"
>
  {{range .Details}}
  <tr>
    <td class="detail-label">{{.Label}}</td>
    <td class="detail-value">{{.Value}}</td>
  </tr>
  {{end}}
</table>
{{end}} {{if .Action}}
<table
  role="presentation"
  class="action-row"
  width="100%"
  cellpadding="0"
  cellspacing="0"
>
  <tr>
    <td class="action-cell" align="center">
      <a class="button" href="{{.Action.URL}}">{{.Copy.Button}}</a>
    </td>
  </tr>
</table>
{{end}} {{if .Copy.FooterNote}}
<p class="footer-note">{{.Copy.FooterNote}}</p>
{{end}} {{template "layout.end" .}} {{end}}
