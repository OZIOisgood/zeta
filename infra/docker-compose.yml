version: "3.9"

services:
  db:
    image: postgres:16
    container_name: zeta-db
    environment:
      POSTGRES_USER: zeta
      POSTGRES_PASSWORD: zeta
      POSTGRES_DB: zeta
    ports:
      # Host port for Postgres; the Makefile exports it from .env (ZETA_DB_PORT).
      - "${ZETA_DB_PORT:-5433}:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data

volumes:
  pg_data:
