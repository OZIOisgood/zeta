version: "3.9"

services:
  db:
    image: postgres:16
    container_name: zeta-db
    environment:
      POSTGRES_USER: zeta
      POSTGRES_PASSWORD: zeta
      POSTGRES_DB: zeta
    ports:
      # Host port is overridable because dev machines often run several
      # Postgres containers; set ZETA_DB_PORT in the root .env and keep your
      # DB_URL in sync with it.
      - "${ZETA_DB_PORT:-5433}:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data

volumes:
  pg_data:
