openapi: 3.1.0
info:
  title: Zeta API
  version: 0.1.0
  description: >
    Contract for the Zeta API consumed by the mobile app. This spec currently
    covers the auth and health endpoints; it grows with each mobile work
    package. The mobile TypeScript client is generated from this file with
    openapi-typescript / openapi-fetch.
servers:
  - url: http://localhost:8080
    description: Local development
tags:
  - name: auth
  - name: system
  - name: assets
  - name: groups
paths:
  /health:
    get:
      tags: [system]
      summary: Health check
      operationId: getHealth
      security: []
      responses:
        "200":
          description: API is healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthResponse"
  /auth/token:
    post:
      tags: [auth]
      summary: Exchange an AuthKit authorization code (PKCE) for a token pair
      operationId: exchangeToken
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TokenExchangeRequest"
      responses:
        "200":
          description: Token pair for the authenticated session
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TokenPair"
        "400":
          description: Missing code or invalid request body
        "401":
          description: WorkOS rejected the authorization code
        "429":
          description: Rate limit exceeded for this client
  /auth/token/refresh:
    post:
      tags: [auth]
      summary: Rotate a token pair using a refresh token
      description: >
        WorkOS invalidates the presented refresh token. Clients must always
        replace their stored pair with the returned one.
      operationId: refreshToken
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TokenRefreshRequest"
      responses:
        "200":
          description: Rotated token pair
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TokenPair"
        "400":
          description: Missing refresh_token or invalid request body
        "401":
          description: Refresh token expired or revoked
        "429":
          description: Rate limit exceeded for this client
  /auth/me:
    get:
      tags: [auth]
      summary: Current user profile, role, permissions, and preferences
      operationId: getMe
      responses:
        "200":
          description: Authenticated user
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Me"
        "401":
          description: Not authenticated
    put:
      tags: [auth]
      summary: Update profile and notification preferences
      operationId: updateMe
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateMeRequest"
      responses:
        "200":
          description: Updated user
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Me"
        "400":
          description: Invalid or missing timezone, invalid body
        "401":
          description: Not authenticated
  /assets:
    get:
      tags: [assets]
      summary: List assets visible to the current user
      operationId: listAssets
      responses:
        "200":
          description: Visible assets (students see their own, experts their groups')
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Asset"
        "401":
          description: Not authenticated
    post:
      tags: [assets]
      summary: Create a new asset and get upload URLs for each video file
      operationId: createAsset
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateAssetRequest"
      responses:
        "200":
          description: Asset created with Mux upload URLs for each video file
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateAssetResponse"
        "400":
          description: Missing title or group_id, invalid body
        "401":
          description: Not authenticated
        "403":
          description: Missing assets:create permission or not a group member
  /assets/{id}:
    get:
      tags: [assets]
      summary: Get a single visible asset including its video parts
      operationId: getAsset
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: The asset with its videos and group
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Asset"
        "400":
          description: Invalid asset id
        "401":
          description: Not authenticated
        "404":
          description: Asset not found or not visible
  /assets/{id}/complete:
    post:
      tags: [assets]
      summary: Mark all video parts as uploaded and transition the asset to pending review
      operationId: completeAssetUpload
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Upload marked as complete
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    enum: [ok]
                required: [status]
        "400":
          description: Invalid asset id
        "401":
          description: Not authenticated
  /groups:
    get:
      tags: [groups]
      summary: List groups the current user belongs to
      operationId: listGroups
      responses:
        "200":
          description: Groups the authenticated user is a member of
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Group"
        "401":
          description: Not authenticated
        "403":
          description: Missing groups:read permission
  /groups/{groupID}:
    get:
      tags: [groups]
      summary: Get a single group by ID
      operationId: getGroup
      parameters:
        - name: groupID
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Group detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Group"
        "400":
          description: Invalid group ID
        "401":
          description: Not authenticated
        "403":
          description: Missing groups:read permission or caller is not a member
        "404":
          description: Group not found
  /groups/{groupID}/membership:
    delete:
      tags: [groups]
      summary: Leave a group
      operationId: leaveGroup
      parameters:
        - name: groupID
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "204":
          description: Successfully left the group
        "400":
          description: Invalid group ID or caller is the group owner
        "401":
          description: Not authenticated
        "403":
          description: Missing groups:membership:leave permission or caller is not a member
        "404":
          description: Group not found
        "409":
          description: Cannot leave the group as the last member
  /groups/{groupID}/users:
    get:
      tags: [groups]
      summary: List student members of a group
      operationId: listGroupStudents
      parameters:
        - name: groupID
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Student members of the group
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GroupUserList"
        "400":
          description: Invalid group ID
        "401":
          description: Not authenticated
        "403":
          description: Missing groups:user-list:read permission
  /groups/{groupID}/experts:
    get:
      tags: [groups]
      summary: List expert members of a group
      operationId: listGroupExperts
      parameters:
        - name: groupID
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Expert and admin members of the group
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GroupUserList"
        "400":
          description: Invalid group ID
        "401":
          description: Not authenticated
        "403":
          description: Missing groups:expert-list:read permission
  # Linter flags this as ambiguous vs /groups/{groupID}/...; chi resolves static
  # segments before path params, so /groups/invitations/* always wins at runtime.
  /groups/invitations/{code}:
    get:
      tags: [groups]
      summary: Get invitation info by code
      operationId: getInvitationInfo
      parameters:
        - name: code
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Invitation details including group info and membership status
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/InvitationInfo"
        "400":
          description: Invitation already used (and caller is not a member)
        "401":
          description: Not authenticated
        "404":
          description: Invitation or group not found
  /groups/invitations/accept:
    post:
      tags: [groups]
      summary: Accept a group invitation
      operationId: acceptInvitation
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AcceptInvitationRequest"
      responses:
        "200":
          description: Invitation accepted (or caller was already a member)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AcceptInvitationResponse"
        "400":
          description: Missing or empty code, or invitation already used
        "401":
          description: Not authenticated
        "404":
          description: Invitation not found
  /groups/invitations/decline:
    post:
      tags: [groups]
      summary: Decline a group invitation
      operationId: declineInvitation
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/DeclineInvitationRequest"
      responses:
        "204":
          description: Invitation declined (or generic-link notification dismissed)
        "400":
          description: Missing or empty code
        "401":
          description: Not authenticated
        "404":
          description: Invitation not found or caller is not the addressed recipient
  /assets/videos/{id}/reviews:
    get:
      tags: [assets]
      summary: List reviews for a video
      operationId: listVideoReviews
      parameters:
        - name: id
          in: path
          required: true
          description: video id
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Reviews for the video
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Review"
        "400":
          description: Invalid video id
        "401":
          description: Not authenticated
        "403":
          description: Missing reviews:read permission
        "404":
          description: Video not found or not visible
    post:
      tags: [assets]
      summary: Create a review on a video
      operationId: createVideoReview
      parameters:
        - name: id
          in: path
          required: true
          description: video id
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateReviewRequest"
      responses:
        "201":
          description: Review created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Review"
        "400":
          description: Invalid video id, invalid body, missing content, or invalid parent_id
        "401":
          description: Not authenticated
        "403":
          description: Missing reviews:create permission or video is part of a completed asset
        "404":
          description: Video not found or not visible
  /auth/logout:
    post:
      tags: [auth]
      summary: End the session and get the WorkOS logout URL
      operationId: logout
      responses:
        "200":
          description: Logout URL to open for session termination at WorkOS
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LogoutResponse"
security:
  - bearerAuth: []
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: WorkOS access token, validated via JWKS
  schemas:
    HealthResponse:
      type: object
      properties:
        status:
          type: string
          enum: [ok]
      required: [status]
    LogoutResponse:
      type: object
      properties:
        logoutUrl:
          type: string
      required: [logoutUrl]
    TokenExchangeRequest:
      type: object
      properties:
        code:
          type: string
          description: Authorization code from the AuthKit redirect
        code_verifier:
          type: string
          description: >
            PKCE code verifier matching the code_challenge sent to AuthKit.
            Required for the mobile PKCE flow; omitted only when a confidential
            client exchanges a code without PKCE.
      required: [code]
    TokenRefreshRequest:
      type: object
      properties:
        refresh_token:
          type: string
      required: [refresh_token]
    TokenPair:
      type: object
      properties:
        access_token:
          type: string
        refresh_token:
          type: string
      required: [access_token, refresh_token]
    EmailPreferences:
      type: object
      properties:
        notifications_enabled:
          type: boolean
        asset_uploads_enabled:
          type: boolean
        asset_reviews_enabled:
          type: boolean
        invitation_updates_enabled:
          type: boolean
        group_membership_updates_enabled:
          type: boolean
        coaching_booking_updates_enabled:
          type: boolean
        coaching_reminders_enabled:
          type: boolean
      required:
        - notifications_enabled
        - asset_uploads_enabled
        - asset_reviews_enabled
        - invitation_updates_enabled
        - group_membership_updates_enabled
        - coaching_booking_updates_enabled
        - coaching_reminders_enabled
    Me:
      type: object
      properties:
        id:
          type: string
        first_name:
          type: string
        last_name:
          type: string
        email:
          type: string
        language:
          type: string
          enum: [en, de, fr]
        avatar:
          type: string
          description: Base64-encoded avatar image, empty when unset
        timezone:
          type: string
        email_preferences:
          $ref: "#/components/schemas/EmailPreferences"
        role:
          type: string
        permissions:
          type: array
          items:
            type: string
      required:
        - id
        - first_name
        - last_name
        - email
        - language
        - avatar
        - timezone
        - email_preferences
        - role
        - permissions
    UpdateMeRequest:
      type: object
      properties:
        first_name:
          type: string
        last_name:
          type: string
        language:
          type: string
          enum: [en, de, fr]
        avatar:
          type: string
          description: Base64-encoded avatar image; omit to keep the current one
        timezone:
          type: string
        email_preferences:
          $ref: "#/components/schemas/EmailPreferences"
      required: [timezone]
    AssetGroup:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        avatar:
          type: string
          description: Base64-encoded group avatar; omitted when unset
      required: [id, name]
    AssetVideo:
      type: object
      properties:
        id:
          type: string
        playback_id:
          type: string
          description: Mux public playback ID; empty while the upload is processing
        status:
          type: string
        review_count:
          type: integer
          format: int64
      required: [id, playback_id, status, review_count]
    Asset:
      type: object
      description: >
        Parent reviewable submission (UI copy calls it a video). List responses
        omit videos and group; the detail response includes them.
      properties:
        id:
          type: string
        title:
          type: string
        description:
          type: string
        owner_id:
          type: string
        status:
          type: string
          enum: [waiting_upload, pending, completed]
        thumbnail:
          type: string
          description: Mux thumbnail URL; omitted while no playback ID exists
        playback_id:
          type: string
        review_count:
          type: integer
          format: int64
        videos:
          type: array
          items:
            $ref: "#/components/schemas/AssetVideo"
        group:
          $ref: "#/components/schemas/AssetGroup"
      required: [id, title, description, owner_id, status, review_count]
    CreateAssetRequest:
      type: object
      properties:
        title:
          type: string
        description:
          type: string
        filenames:
          type: array
          items:
            type: string
        group_id:
          type: string
          format: uuid
      required: [title, description, filenames, group_id]
    CreateAssetVideo:
      type: object
      properties:
        id:
          type: string
        upload_url:
          type: string
          description: Mux direct-upload URL; PUT the file binary here
        filename:
          type: string
      required: [id, upload_url, filename]
    CreateAssetResponse:
      type: object
      properties:
        asset_id:
          type: string
        videos:
          type: array
          items:
            $ref: "#/components/schemas/CreateAssetVideo"
      required: [asset_id, videos]
    Group:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        owner_id:
          type: string
        avatar:
          type: [string, "null"]
          description: Base64-encoded group avatar
        description:
          type: string
        created_at:
          type: string
        updated_at:
          type: string
      required: [id, name, owner_id, avatar, description, created_at, updated_at]
    ReviewAuthor:
      type: object
      properties:
        name:
          type: string
        avatar:
          type: string
          description: Base64-encoded avatar; omitted when unset
      required: [name]
    Review:
      type: object
      properties:
        id:
          type: string
        content:
          type: string
        timestamp_seconds:
          type: integer
          format: int32
          description: Player position the comment refers to; omitted for untimed comments
        parent_id:
          type: string
          description: Present on replies
        author:
          $ref: "#/components/schemas/ReviewAuthor"
        created_at:
          type: string
          format: date-time
      required: [id, content, created_at]
    CreateReviewRequest:
      type: object
      properties:
        content:
          type: string
        timestamp_seconds:
          type: integer
          format: int32
        parent_id:
          type: string
      required: [content]
    GroupUser:
      type: object
      properties:
        id:
          type: string
        email:
          type: string
        first_name:
          type: string
        last_name:
          type: string
        avatar:
          type: string
          description: Base64-encoded avatar; omitted when unset
        role:
          type: string
      required: [id, email, first_name, last_name, role]
    GroupUserList:
      type: object
      properties:
        data:
          type: array
          items:
            $ref: "#/components/schemas/GroupUser"
      required: [data]
    InvitationInfo:
      type: object
      properties:
        code:
          type: string
        group_id:
          type: string
        group_name:
          type: string
        group_avatar:
          type: string
          description: Base64-encoded group avatar; empty string when the group has no avatar set
        already_member:
          type: boolean
      required: [code, group_id, group_name, group_avatar, already_member]
    AcceptInvitationRequest:
      type: object
      properties:
        code:
          type: string
      required: [code]
    AcceptInvitationResponse:
      type: object
      properties:
        group_id:
          type: string
      required: [group_id]
    DeclineInvitationRequest:
      type: object
      properties:
        code:
          type: string
      required: [code]
