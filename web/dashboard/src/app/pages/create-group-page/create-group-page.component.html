<app-page-container>
  <app-breadcrumbs
    [items]="[{ label: 'common.nav.groups', routerLink: '/groups' }, { label: 'groups.create' }]"
  ></app-breadcrumbs>

  <app-section-header title="groups.create"></app-section-header>

  <form [formGroup]="form" (ngSubmit)="onSubmit()" class="create-group-form">
    <div class="form-field">
      <tui-textfield>
        <label tuiLabel>{{ 'groups.groupName' | translate }}</label>
        <input formControlName="name" tuiTextfield type="text" />
      </tui-textfield>

      <div
        *ngIf="form.get('name')?.invalid && form.get('name')?.touched"
        class="tui-text_body-s error-message"
      >
        {{ 'groups.groupNameRequired' | translate }}
      </div>
    </div>

    <div class="form-field">
      <tui-textfield>
        <label tuiLabel>{{ 'common.fields.description' | translate }}</label>
        <textarea tuiTextarea formControlName="description" [min]="3" [max]="10"></textarea>
      </tui-textfield>
    </div>

    <app-avatar-selector
      [disabled]="isSubmitting"
      (avatarChange)="onAvatarChange($event)"
    ></app-avatar-selector>

    <div class="form-actions">
      <button
        type="button"
        (click)="onCancel()"
        tuiButton
        appearance="secondary"
        size="m"
        [disabled]="isSubmitting"
      >
        {{ 'common.actions.cancel' | translate }}
      </button>
      <button
        type="submit"
        [disabled]="form.invalid || isSubmitting || !avatarBase64"
        tuiButton
        size="m"
      >
        {{ (isSubmitting ? 'groups.creating' : 'common.actions.create') | translate }}
      </button>
    </div>
  </form>
</app-page-container>
