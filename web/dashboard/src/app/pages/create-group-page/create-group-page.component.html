<app-page-container>
  <app-breadcrumbs
    [items]="[{ label: 'Groups', routerLink: '/groups' }, { label: 'Create Group' }]"
  ></app-breadcrumbs>

  <app-section-header title="Create Group"></app-section-header>

  <form [formGroup]="form" (ngSubmit)="onSubmit()" class="create-group-form">
    <div class="form-field">
      <tui-textfield>
        <label tuiLabel>Group Name</label>
        <input formControlName="name" tuiTextfield type="text" />
      </tui-textfield>

      <div
        *ngIf="form.get('name')?.invalid && form.get('name')?.touched"
        class="tui-text_body-s error-message"
      >
        Group name is required
      </div>
    </div>

    <div class="form-field">
      <tui-textfield>
        <label tuiLabel>Description</label>
        <textarea tuiTextarea formControlName="description" [min]="3" [max]="10"></textarea>
      </tui-textfield>
    </div>

    <app-avatar-selector
      [disabled]="isSubmitting"
      (avatarChange)="onAvatarChange($event)"
    ></app-avatar-selector>

    <div class="form-actions">
      <button
        type="button"
        (click)="onCancel()"
        tuiButton
        appearance="flat"
        size="m"
        [disabled]="isSubmitting"
      >
        Cancel
      </button>
      <button
        type="submit"
        [disabled]="form.invalid || isSubmitting || !avatarBase64"
        tuiButton
        size="m"
      >
        {{ isSubmitting ? 'Creating...' : 'Create' }}
      </button>
    </div>
  </form>
</app-page-container>
