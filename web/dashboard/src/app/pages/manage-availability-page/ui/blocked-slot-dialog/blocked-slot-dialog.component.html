<div class="dialog-form">
  <form [formGroup]="form" (ngSubmit)="onSubmit()">
    <div class="form-field">
      <tui-textfield>
        <label tuiLabel>{{ 'common.fields.date' | translate }}</label>
        <input formControlName="blocked_date" tuiTextfield type="date" />
      </tui-textfield>
    </div>

    <label tuiLabel>
      <input tuiCheckbox type="checkbox" formControlName="full_day" />
      {{ 'common.labels.fullDay' | translate }}
    </label>

    @if (!form.value.full_day) {
      <div class="form-row">
        <div class="form-field form-field--half">
          <tui-textfield>
            <label tuiLabel>{{ 'common.fields.startTime' | translate }}</label>
            <input formControlName="start_time" tuiTextfield type="time" />
          </tui-textfield>
        </div>
        <div class="form-field form-field--half">
          <tui-textfield>
            <label tuiLabel>{{ 'common.fields.endTime' | translate }}</label>
            <input formControlName="end_time" tuiTextfield type="time" />
          </tui-textfield>
        </div>
      </div>
    }

    <div class="form-field">
      <tui-textfield>
        <label tuiLabel>{{ 'common.fields.reasonOptional' | translate }}</label>
        <input
          formControlName="reason"
          tuiTextfield
          type="text"
          [placeholder]="'sessions.availability.reasonPlaceholder' | translate"
        />
      </tui-textfield>
    </div>

    <div class="form-actions">
      <button tuiButton type="button" appearance="secondary" (click)="onCancel()">
        {{ 'common.actions.cancel' | translate }}
      </button>
      <button tuiButton type="submit" [disabled]="form.invalid">
        {{ 'common.actions.block' | translate }}
      </button>
    </div>
  </form>
</div>
