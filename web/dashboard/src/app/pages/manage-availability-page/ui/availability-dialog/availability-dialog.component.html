<div class="dialog-form">
  <form [formGroup]="form" (ngSubmit)="onSubmit()">
    <div class="form-field">
      <tui-textfield tuiChevron [stringify]="dayStringify">
        <label tuiLabel>{{ 'common.labels.day' | translate }}</label>
        <input tuiSelect formControlName="day_of_week" />
        <tui-data-list-wrapper
          *tuiTextfieldDropdown
          new
          [items]="dayOptions"
          [itemContent]="dayContent"
        />
      </tui-textfield>

      <ng-template #dayContent let-item>
        {{ dayStringify(item) }}
      </ng-template>
    </div>

    <div class="form-row">
      <div class="form-field form-field--half">
        <tui-textfield>
          <label tuiLabel>{{ 'common.fields.startTime' | translate }}</label>
          <input formControlName="start_time" tuiTextfield type="time" />
        </tui-textfield>
      </div>
      <div class="form-field form-field--half">
        <tui-textfield>
          <label tuiLabel>{{ 'common.fields.endTime' | translate }}</label>
          <input formControlName="end_time" tuiTextfield type="time" />
        </tui-textfield>
      </div>
    </div>

    <div class="form-actions">
      <button tuiButton type="button" appearance="secondary" (click)="onCancel()">
        {{ 'common.actions.cancel' | translate }}
      </button>
      <button tuiButton type="submit" [disabled]="form.invalid">
        {{ (isEditing ? 'common.actions.save' : 'common.actions.create') | translate }}
      </button>
    </div>
  </form>
</div>
