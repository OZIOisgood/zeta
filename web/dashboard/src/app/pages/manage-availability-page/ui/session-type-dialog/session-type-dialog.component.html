<div class="dialog-form">
  <form [formGroup]="form" (ngSubmit)="onSubmit()">
    <div class="form-field">
      <tui-textfield>
        <label tuiLabel>{{ 'common.fields.name' | translate }}</label>
        <input
          formControlName="name"
          tuiTextfield
          type="text"
          [placeholder]="'sessions.availability.namePlaceholder' | translate"
        />
      </tui-textfield>
    </div>

    <div class="form-field">
      <tui-textfield>
        <label tuiLabel>{{ 'sessions.availability.descriptionOptional' | translate }}</label>
        <input
          formControlName="description"
          tuiTextfield
          type="text"
          [placeholder]="'sessions.availability.descriptionPlaceholder' | translate"
        />
      </tui-textfield>
    </div>

    <div class="form-field">
      <tui-textfield [stringify]="durationStringify">
        <label tuiLabel>{{ 'common.fields.duration' | translate }}</label>
        <input tuiSelect formControlName="duration_minutes" />
        <tui-data-list-wrapper
          *tuiTextfieldDropdown
          new
          [items]="durationOptions"
          [itemContent]="durationContent"
        />
      </tui-textfield>

      <ng-template #durationContent let-item>
        {{ 'common.labels.minutesShort' | translate: { count: item } }}
      </ng-template>
    </div>

    <div class="form-actions">
      <button tuiButton type="button" appearance="secondary" (click)="onCancel()">
        {{ 'common.actions.cancel' | translate }}
      </button>
      <button tuiButton type="submit" [disabled]="form.invalid">
        {{ (isEditing ? 'common.actions.save' : 'common.actions.create') | translate }}
      </button>
    </div>
  </form>
</div>
