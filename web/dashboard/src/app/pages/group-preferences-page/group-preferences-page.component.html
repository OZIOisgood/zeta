<app-page-container>
  <div class="preferences-page">
    <app-breadcrumbs [items]="breadcrumbs()"></app-breadcrumbs>

    <app-section-header title="groups.preferences"></app-section-header>

    @if (loading()) {
      <div class="loading-placeholder">
        <div [tuiSkeleton]="true" style="height: 2.5rem; border-radius: 0.5rem"></div>
      </div>
    } @else {
      <section class="content">
        <nav
          tuiTabs
          vertical="left"
          class="tabs-nav tabs-nav--desktop"
          [activeItemIndex]="activeTabIndex()"
          (activeItemIndexChange)="onTabIndexChange($event)"
        >
          <button tuiTab type="button">{{ 'groups.preferencesTab' | translate }}</button>
          @if (isOwner()) {
            <button tuiTab type="button">{{ 'groups.dangerZone' | translate }}</button>
          }
        </nav>

        <nav
          tuiTabs
          size="m"
          class="tabs-nav tabs-nav--mobile"
          [underline]="true"
          [activeItemIndex]="activeTabIndex()"
          (activeItemIndexChange)="onTabIndexChange($event)"
        >
          <button tuiTab type="button">{{ 'groups.preferencesTab' | translate }}</button>
          @if (isOwner()) {
            <button tuiTab type="button">{{ 'groups.dangerZone' | translate }}</button>
          }
        </nav>

        <div class="tab-content">
          @if (activeTabIndex() === 0) {
            <form [formGroup]="form" (ngSubmit)="onSubmit()" class="preferences-form">
              <div class="form-field">
                <tui-textfield>
                  <label tuiLabel>{{ 'common.fields.name' | translate }}</label>
                  <input formControlName="name" tuiTextfield type="text" />
                </tui-textfield>
              </div>

              <div class="form-field">
                <tui-textfield>
                  <label tuiLabel>{{ 'common.fields.description' | translate }}</label>
                  <textarea
                    tuiTextarea
                    formControlName="description"
                    [min]="3"
                    [max]="10"
                  ></textarea>
                </tui-textfield>
              </div>

              <app-avatar-selector
                [initialAvatar]="getInitialAvatar()"
                [disabled]="isSubmitting"
                (avatarChange)="onAvatarChange($event)"
              ></app-avatar-selector>

              <div class="form-actions">
                <button tuiButton type="submit" [disabled]="isSaveDisabled">
                  {{ 'common.actions.save' | translate }}
                </button>
              </div>
            </form>
          }

          @if (activeTabIndex() === 1 && isOwner()) {
            <div class="danger-zone">
              <h4 class="danger-zone__title">{{ 'groups.dangerZone' | translate }}</h4>
              <div class="danger-zone__row">
                <div class="danger-zone__description">
                  <strong>{{ 'groups.deleteThisGroup' | translate }}</strong>
                  <p>{{ 'groups.deleteDescription' | translate }}</p>
                </div>
                <button
                  tuiButton
                  type="button"
                  appearance="destructive"
                  size="m"
                  [disabled]="isDeleting"
                  (click)="onDeleteGroup()"
                >
                  {{ 'groups.deleteGroup' | translate }}
                </button>
              </div>
            </div>
          }
        </div>
      </section>
    }
  </div>
</app-page-container>
