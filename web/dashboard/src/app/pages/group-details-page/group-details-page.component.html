<app-page-container>
  @if (group$ | async; as group) {
    <app-breadcrumbs
      [items]="[{ label: 'Groups', routerLink: '/groups' }, { label: group.name }]"
    ></app-breadcrumbs>

    <div class="group-hero">
      <div class="group-banner" [style.background]="headerGradient$ | async"></div>
      <div class="group-identity">
        @if (getAvatarSrc(group.avatar); as avatarSrc) {
          <img [src]="avatarSrc" alt="Group Avatar" class="avatar-image" />
        } @else {
          <div class="avatar-placeholder">
            <span>{{ group.name[0] | uppercase }}</span>
          </div>
        }
        <div class="group-meta">
          <h1 class="tui-text_h2 group-name">{{ group.name }}</h1>
        </div>
        @if (showPrefsButton()) {
          <button
            tuiButton
            appearance="flat"
            size="s"
            iconStart="@tui.settings"
            class="prefs-button"
            (click)="openPreferencesPage(group.id)"
          >
            Preferences
          </button>
        }
      </div>
    </div>

    <section tuiCardLarge="compact" *ngIf="group.description" class="description-section">
      <tui-elastic-container class="tui-text_body-m" style="white-space: pre-wrap">
        {{ getDisplayDescription(group) }}
        <button *ngIf="shouldShowToggle(group)" tuiLink type="button" (click)="toggleDescription()">
          Show {{ descriptionExpanded ? 'less' : 'more' }}
        </button>
      </tui-elastic-container>
    </section>

    <div *ngIf="showUsersList()" class="users-section">
      <div class="users-header">
        <h2 class="tui-text_h3">Users</h2>
        @if (showInviteButton()) {
          <button
            tuiButton
            appearance="flat"
            size="s"
            iconStart="@tui.mail"
            (click)="openInviteDialog(group.id)"
          >
            Invite User
          </button>
        }
      </div>
      <app-users-list [groupId]="group.id"></app-users-list>
    </div>
  }
</app-page-container>
