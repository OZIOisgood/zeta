<div class="dialog-form">
  <p class="dialog-description">
    This will cancel the session with <strong>{{ data.otherParty }}</strong> on
    {{ data.scheduledAt }}.
  </p>

  <form [formGroup]="form" (ngSubmit)="onSubmit()">
    <div class="form-field">
      <tui-textfield [tuiTextfieldCleaner]="false">
        <label tuiLabel>Reason (optional)</label>
        <textarea
          tuiTextarea
          formControlName="cancellation_reason"
          [min]="3"
          [max]="8"
          placeholder="Let them know why you are cancelling..."
        ></textarea>
      </tui-textfield>
    </div>

    <div class="form-actions">
      <button tuiButton type="submit" appearance="destructive">Cancel Session</button>
      <button tuiButton type="button" appearance="secondary" (click)="onCancel()">
        Keep Session
      </button>
    </div>
  </form>
</div>
