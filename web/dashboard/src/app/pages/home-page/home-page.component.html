<app-page-container>
  <app-coaching-widget *ngIf="showCoaching()"></app-coaching-widget>

  <app-asset-list
    [assets]="(assets$ | async) || []"
    [loading]="loading()"
    [showAddTile]="showUploadVideo()"
    [role]="auth.user()?.role"
    [title]="'All my videos'"
    (addVideo)="onAddVideo()"
  >
  </app-asset-list>
</app-page-container>
