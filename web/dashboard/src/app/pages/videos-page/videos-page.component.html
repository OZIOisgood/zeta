<app-page-container>
  @if (showReviewStatusFilters()) {
    <app-section-header title="Videos" [loading]="loading()"></app-section-header>

    @if (!loading() && assets().length > 0) {
      <div class="filter-bar">
        <button
          tuiButton
          type="button"
          size="s"
          [appearance]="selectedReviewStatusFilters().length === 0 ? 'primary' : 'secondary'"
          (click)="clearReviewStatusFilters()"
        >
          All
        </button>
        <tui-filter
          class="review-status-filter"
          size="s"
          [formControl]="reviewStatusFilter"
          [items]="reviewStatusFilterItems"
          [badgeHandler]="reviewStatusBadgeHandler"
        />
      </div>
    }

    <app-asset-list
      [assets]="filteredReviewStatusAssets()"
      [loading]="loading()"
      [showAddTile]="showUploadVideo()"
      [showAddTileWhenEmpty]="true"
      [role]="auth.user()?.role"
      title=""
      [emptyHeading]="reviewStatusEmptyHeading()"
      [emptyDescription]="reviewStatusEmptyDescription()"
      (addVideo)="onAddVideo()"
    ></app-asset-list>
  } @else {
    <app-asset-list
      [assets]="assets()"
      [loading]="loading()"
      [showAddTile]="showUploadVideo()"
      [role]="auth.user()?.role"
      title="Videos"
      (addVideo)="onAddVideo()"
    ></app-asset-list>
  }
</app-page-container>
