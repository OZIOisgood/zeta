<app-page-container>
  @if (showReviewStatusFilters()) {
    <app-section-header title="videos.title" [loading]="loading()"></app-section-header>

    @if (!loading() && assets().length > 0) {
      <div class="filter-bar">
        <button
          tuiButton
          type="button"
          size="s"
          [appearance]="selectedReviewStatusFilters().length === 0 ? 'primary' : 'secondary'"
          (click)="clearReviewStatusFilters()"
        >
          {{ 'videos.all' | translate }}
        </button>
        @for (filter of reviewStatusFilterItems; track filter) {
          <button
            tuiButton
            type="button"
            size="s"
            [appearance]="isReviewStatusSelected(filter) ? 'primary' : 'secondary'"
            (click)="toggleReviewStatusFilter(filter)"
          >
            {{ reviewStatusLabel(filter) }} ({{ reviewStatusBadgeHandler(filter) }})
          </button>
        }
      </div>
    }

    <app-asset-list
      [assets]="filteredReviewStatusAssets()"
      [loading]="loading()"
      [showAddTile]="showUploadVideo()"
      [showAddTileWhenEmpty]="true"
      [role]="auth.user()?.role"
      title=""
      [emptyHeading]="reviewStatusEmptyHeading()"
      [emptyDescription]="reviewStatusEmptyDescription()"
      (addVideo)="onAddVideo()"
    ></app-asset-list>
  } @else {
    <app-asset-list
      [assets]="assets()"
      [loading]="loading()"
      [showAddTile]="showUploadVideo()"
      [role]="auth.user()?.role"
      title="videos.title"
      (addVideo)="onAddVideo()"
    ></app-asset-list>
  }
</app-page-container>
