<h1 class="tui-text_h3 list-title" *ngIf="title" [tuiSkeleton]="loading">{{ title }}</h1>

<div class="grid" *ngIf="loading">
  <div
    *ngFor="let _ of [1, 2, 3, 4]"
    tuiAppearance="neutral"
    tuiCardMedium
    class="skeleton-tile"
    [tuiSkeleton]="true"
  ></div>
</div>

<tui-block-status *ngIf="!loading && groups.length === 0 && !showCreateTile">
  <img
    alt="No groups yet"
    src="/illustrations/lonely-horse.png"
    tuiSlot="top"
    class="empty-illustration"
  />
  <h4>No groups yet</h4>
  <span>You haven't joined any groups yet.</span>
</tui-block-status>

<tui-block-status *ngIf="!loading && groups.length === 0 && showCreateTile">
  <img
    alt="No groups yet"
    src="/illustrations/lonely-horse.png"
    tuiSlot="top"
    class="empty-illustration"
  />
  <h4>Create your first group</h4>
  <span>Get started by creating a group for your students.</span>
  <button tuiButton appearance="primary" type="button" (click)="createGroup.emit()">
    Create group
  </button>
</tui-block-status>

<div class="grid" *ngIf="!loading && groups.length > 0">
  <div
    *ngIf="showCreateTile"
    tuiAppearance="neutral"
    tuiCardMedium
    class="create-tile"
    (click)="onCreateClick()"
    (keydown.enter)="onCreateClick()"
    role="button"
    tabindex="0"
  >
    <tui-avatar src="@tui.plus" class="plus"></tui-avatar>

    <h2 tuiTitle>
      Add
      <span tuiSubtitle>Create a new group</span>
    </h2>
  </div>

  <div
    *ngFor="let group of groups"
    tuiCardMedium
    tuiSurface
    class="group-tile"
    (click)="onGroupClick(group.id)"
    (keydown.enter)="onGroupClick(group.id)"
    role="button"
    tabindex="0"
  >
    <h2 tuiTitle>
      {{ group.name }}
    </h2>
    <div
      class="group-avatar"
      *ngIf="group.avatar"
      [style.background-image]="'url(data:image/jpeg;base64,' + group.avatar + ')'"
    ></div>
  </div>
</div>
