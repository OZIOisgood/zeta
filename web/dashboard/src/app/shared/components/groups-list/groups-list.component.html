<app-section-header *ngIf="title" [title]="title" [loading]="loading"></app-section-header>

<div class="grid" *ngIf="loading">
  <div
    *ngFor="let _ of [1, 2, 3, 4]"
    tuiAppearance="neutral"
    tuiCardMedium
    class="skeleton-tile"
    [tuiSkeleton]="true"
  ></div>
</div>

<app-illustrated-message
  *ngIf="!loading && groups.length === 0 && !showCreateTile"
  illustrationSrc="/illustrations/lonely-horse.png"
  illustrationAlt="groups.noGroupsYet"
  heading="groups.noGroupsYet"
  description="groups.noGroupsJoined"
></app-illustrated-message>

<app-illustrated-message
  *ngIf="!loading && groups.length === 0 && showCreateTile"
  illustrationSrc="/illustrations/lonely-horse.png"
  illustrationAlt="groups.noGroupsYet"
  heading="groups.createFirst"
  description="groups.createFirstDescription"
  [buttons]="[{ label: 'common.actions.createGroup', appearance: 'primary' }]"
  (buttonClick)="createGroup.emit()"
></app-illustrated-message>

<div class="grid" *ngIf="!loading && groups.length > 0">
  <div
    *ngIf="showCreateTile"
    tuiAppearance="neutral"
    tuiCardMedium
    class="create-tile"
    (click)="onCreateClick()"
    (keydown.enter)="onCreateClick()"
    role="button"
    tabindex="0"
  >
    <tui-avatar src="@tui.plus" class="plus"></tui-avatar>

    <h2 tuiTitle>
      {{ 'common.actions.add' | translate }}
      <span tuiSubtitle>{{ 'groups.createNew' | translate }}</span>
    </h2>
  </div>

  <div
    *ngFor="let group of groups"
    tuiCardMedium
    tuiSurface
    class="group-tile"
    (click)="onGroupClick(group.id)"
    (keydown.enter)="onGroupClick(group.id)"
    role="button"
    tabindex="0"
  >
    <h2 tuiTitle>
      {{ group.name }}
    </h2>
    <div
      class="group-avatar"
      *ngIf="group.avatar"
      [style.background-image]="'url(data:image/jpeg;base64,' + group.avatar + ')'"
    ></div>
  </div>
</div>
