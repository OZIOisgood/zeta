<app-section-header *ngIf="title" [title]="title" [loading]="loading">
  <a
    *ngIf="headerActionLabel && headerActionRouterLink && !loading"
    tuiButton
    appearance="secondary"
    size="s"
    [routerLink]="headerActionRouterLink"
  >
    {{ headerActionLabel | translate }}
  </a>
</app-section-header>

<div class="grid" *ngIf="loading">
  <div
    *ngFor="let _ of [1, 2, 3, 4, 5, 6]"
    tuiAppearance="neutral"
    tuiCardMedium
    class="skeleton-tile"
    [tuiSkeleton]="true"
  ></div>
</div>

<app-illustrated-message
  *ngIf="!loading && assets.length === 0 && !showAddTile"
  illustrationSrc="/illustrations/bored-horse.png"
  illustrationAlt="videos.noVideosYet"
  [heading]="emptyHeading"
  [description]="
    emptyDescription ||
    (role === 'expert'
      ? 'videos.noStudentVideos'
      : 'videos.noVideosHere')
  "
></app-illustrated-message>

<app-illustrated-message
  *ngIf="!loading && assets.length === 0 && showAddTile && !showAddTileWhenEmpty"
  illustrationSrc="/illustrations/bored-horse.png"
  illustrationAlt="videos.noVideosYet"
  heading="videos.uploadFirst"
  description="videos.uploadFirstDescription"
  [buttons]="[{ label: 'common.actions.uploadVideo', appearance: 'primary' }]"
  (buttonClick)="addVideo.emit()"
></app-illustrated-message>

<div
  class="grid"
  *ngIf="!loading && (assets.length > 0 || (showAddTile && showAddTileWhenEmpty))"
>
  <div
    *ngIf="showAddTile"
    tuiAppearance="neutral"
    tuiCardMedium
    class="add-tile"
    (click)="addVideo.emit()"
    (keydown.enter)="addVideo.emit()"
    role="button"
    tabindex="0"
  >
    <tui-avatar src="@tui.plus" class="plus"></tui-avatar>

    <h2 tuiTitle>
      {{ 'common.actions.add' | translate }}
      <span tuiSubtitle>{{ 'videos.uploadNew' | translate }}</span>
    </h2>
  </div>

  <a
    *ngFor="let asset of assets"
    [routerLink]="['/asset', asset.id]"
    tuiCardMedium
    tuiSurface
    class="asset-tile"
    [style.--asset-bg]="getThumbnail(asset)"
    (mouseenter)="onMouseEnter(asset.id)"
    (mouseleave)="onMouseLeave()"
  >
    <h2 tuiTitle>
      <span class="title-text">{{ asset.title }}</span>
      <span tuiSubtitle *ngIf="asset.description" class="subtitle-text">{{
        asset.description
      }}</span>
    </h2>

    <tui-badge class="badge" [ngClass]="'status-' + asset.status">
      {{ formatStatus(asset.status) }}
    </tui-badge>
  </a>
</div>
