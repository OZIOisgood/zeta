<h1 class="tui-text_h3 list-title" *ngIf="title" [tuiSkeleton]="loading">{{ title }}</h1>

<div class="grid" *ngIf="loading">
  <div
    *ngFor="let _ of [1, 2, 3, 4, 5, 6]"
    tuiAppearance="neutral"
    tuiCardMedium
    class="skeleton-tile"
    [tuiSkeleton]="true"
  ></div>
</div>

<tui-block-status *ngIf="!loading && assets.length === 0 && !showAddTile">
  <img
    alt="No videos yet"
    src="/illustrations/bored-horse.png"
    tuiSlot="top"
    class="empty-illustration"
  />
  <h4>No videos yet</h4>
  <span *ngIf="role === 'expert'">Your students haven't uploaded any videos yet.</span>
  <span *ngIf="role !== 'expert'">There are no videos here yet.</span>
</tui-block-status>

<tui-block-status *ngIf="!loading && assets.length === 0 && showAddTile">
  <img
    alt="No videos yet"
    src="/illustrations/bored-horse.png"
    tuiSlot="top"
    class="empty-illustration"
  />
  <h4>Upload your first video</h4>
  <span>Get started by uploading a video for review.</span>
  <button tuiButton appearance="primary" type="button" (click)="addVideo.emit()">
    Upload video
  </button>
</tui-block-status>

<div class="grid" *ngIf="!loading && assets.length > 0">
  <div
    *ngIf="showAddTile"
    tuiAppearance="neutral"
    tuiCardMedium
    class="add-tile"
    (click)="addVideo.emit()"
    (keydown.enter)="addVideo.emit()"
    role="button"
    tabindex="0"
  >
    <tui-avatar src="@tui.plus" class="plus"></tui-avatar>

    <h2 tuiTitle>
      Add
      <span tuiSubtitle>Upload new video</span>
    </h2>
  </div>

  <a
    *ngFor="let asset of assets"
    [routerLink]="['/asset', asset.id]"
    tuiCardMedium
    tuiSurface
    class="asset-tile"
    [style.--asset-bg]="getThumbnail(asset)"
    (mouseenter)="onMouseEnter(asset.id)"
    (mouseleave)="onMouseLeave()"
  >
    <h2 tuiTitle>
      <span class="title-text">{{ asset.title }}</span>
      <span tuiSubtitle *ngIf="asset.description" class="subtitle-text">{{
        asset.description
      }}</span>
    </h2>

    <tui-badge class="badge" [ngClass]="'status-' + asset.status">
      {{ formatStatus(asset.status) }}
    </tui-badge>
  </a>
</div>
