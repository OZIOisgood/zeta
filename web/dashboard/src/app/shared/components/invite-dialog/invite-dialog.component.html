<div class="invite-container">
  @if (!inviteLink) {
    <div class="form-field">
      <tui-textfield>
        <label tuiLabel>{{ 'common.fields.emailAddressOptional' | translate }}</label>
        <input
          [formControl]="emailControl"
          tuiTextfield
          type="email"
          placeholder="user@example.com"
        />
      </tui-textfield>
    </div>

    @if (errorMessage) {
      <p class="error-message">{{ errorMessage }}</p>
    }

    <div class="form-actions">
      <button
        tuiButton
        type="button"
        appearance="secondary"
        (click)="onClose()"
        [disabled]="isSubmitting"
      >
        {{ 'common.actions.cancel' | translate }}
      </button>
      <button
        tuiButton
        type="button"
        (click)="onSubmit()"
        [disabled]="emailControl.invalid || isSubmitting"
      >
        {{ 'common.actions.createInvitation' | translate }}
      </button>
    </div>
  } @else {
    <p class="success-message">
      {{
        (invitationSentByEmail ? 'groups.inviteDialog.sent' : 'groups.inviteDialog.linkCreated')
          | translate
      }}
    </p>

    @if (qrImageUrl) {
      <div class="qr-section">
        <img [src]="qrImageUrl" [alt]="'groups.inviteDialog.qrAlt' | translate" class="qr-image" />
      </div>
    }

    <div class="link-section">
      <code class="invite-link">{{ inviteLink }}</code>
    </div>

    <div class="form-actions">
      <button
        tuiButton
        type="button"
        appearance="secondary"
        size="s"
        (click)="onCopyLink()"
      >
        <tui-icon icon="@tui.copy" />
        {{ (linkCopied ? 'common.actions.copied' : 'common.actions.copyLink') | translate }}
      </button>
      @if (qrImageUrl) {
        <button
          tuiButton
          type="button"
          appearance="secondary"
          size="s"
          (click)="onDownloadQr()"
        >
          <tui-icon icon="@tui.download" />
          {{ 'common.actions.downloadQr' | translate }}
        </button>
      }
      <button
        tuiButton
        type="button"
        (click)="onClose()"
      >
        {{ 'common.actions.done' | translate }}
      </button>
    </div>
  }
</div>
