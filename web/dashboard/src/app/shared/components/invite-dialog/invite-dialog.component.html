<div class="invite-container">
  <div class="form-field">
    <tui-textfield>
      <label tuiLabel>Email Address</label>
      <input
        [formControl]="emailControl"
        tuiTextfield
        type="email"
        placeholder="user@example.com"
      />
    </tui-textfield>
  </div>

  @if (errorMessage) {
    <p class="error-message">{{ errorMessage }}</p>
  }

  <div class="form-actions">
    <button
      tuiButton
      type="button"
      (click)="onSubmit()"
      [disabled]="emailControl.invalid || isSubmitting"
    >
      Send Invitation
    </button>
    <button
      tuiButton
      type="button"
      appearance="flat"
      (click)="onCancel()"
      [disabled]="isSubmitting"
    >
      Cancel
    </button>
  </div>
</div>
