<div class="loading-screen" *ngIf="auth.loading() || auth.unauthenticated()">
  <img src="/app-icon.png" alt="Zeta" class="loading-logo" />
  <tui-icon icon="@tui.loader-circle" class="loading-spinner"></tui-icon>
</div>

<div class="shell" *ngIf="!auth.loading() && !auth.unauthenticated()">
  <app-navbar></app-navbar>
  <main class="content">
    <router-outlet></router-outlet>
  </main>
</div>
