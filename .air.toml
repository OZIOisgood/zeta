root = "."
tmp_dir = "tmp/air"

[build]
  bin = "./tmp/air/api"
  cmd = "go build -o ./tmp/air/api ./cmd/api"
  delay = 1000
  entrypoint = ["./tmp/air/api"]
  exclude_dir = [
    ".git",
    ".pnpm-store",
    "assets",
    "bin",
    "coverage",
    "infra",
    "tmp",
    "web/dashboard/node_modules"
  ]
  exclude_file = []
  exclude_regex = ["_test\\.go"]
  exclude_unchanged = true
  follow_symlink = false
  full_bin = ""
  include_dir = ["cmd", "internal"]
  include_ext = ["go", "tpl", "tmpl", "html"]
  kill_delay = "500ms"
  log = "build-errors.log"
  poll = false
  poll_interval = 0
  rerun = false
  rerun_delay = 500
  send_interrupt = true
  stop_on_error = true

[color]
  app = ""
  build = "yellow"
  main = "magenta"
  runner = "green"
  watcher = "cyan"

[log]
  main_only = false
  time = false

[misc]
  clean_on_exit = true

[proxy]
  app_port = 0
  enabled = false
  proxy_port = 0

[screen]
  clear_on_rebuild = false
  keep_scroll = true
