name: Deploy — Dev

on:
  push:
    branches:
      - main

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  REGION: europe-west1
  SERVICE: zeta-api
  IMAGE: europe-west1-docker.pkg.dev/${{ vars.GCP_PROJECT_ID }}/zeta/api

jobs:
  build-and-deploy:
    name: Build & Deploy to Dev
    runs-on: ubuntu-latest
    environment: dev
    permissions:
      contents: read
      id-token: write

    steps:
      - uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WIF_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker ${{ env.REGION }}-docker.pkg.dev --quiet

      - name: Build and push image
        run: |
          IMAGE_TAG="${{ env.IMAGE }}:${{ github.sha }}"
          docker build -t "$IMAGE_TAG" -t "${{ env.IMAGE }}:latest" .
          docker push "$IMAGE_TAG"
          docker push "${{ env.IMAGE }}:latest"

      - name: Deploy to Cloud Run
        run: |
          gcloud run deploy ${{ env.SERVICE }} \
            --image "${{ env.IMAGE }}:${{ github.sha }}" \
            --region ${{ env.REGION }} \
            --project ${{ vars.GCP_PROJECT_ID }} \
            --platform managed \
            --allow-unauthenticated \
            --set-secrets="DB_URL=zeta-dev-db-url:latest,WORKOS_API_KEY=zeta-dev-workos-api-key:latest,WORKOS_CLIENT_ID=zeta-dev-workos-client-id:latest,WORKOS_COOKIE_SECRET=zeta-dev-workos-cookie-secret:latest,MUX_TOKEN_ID=zeta-dev-mux-token-id:latest,MUX_TOKEN_SECRET=zeta-dev-mux-token-secret:latest,RESEND_API_KEY=zeta-dev-resend-api-key:latest,OPENROUTER_API_KEY=zeta-dev-openrouter-api-key:latest" \
            --set-env-vars="ENV=dev,LOG_LEVEL=debug,DEFAULT_LANGUAGE=en,WORKOS_REDIRECT_URI=https://${{ vars.CLOUD_RUN_DEV_URL }}/auth/callback,DEFAULT_ORG_ID=${{ vars.WORKOS_DEV_DEFAULT_ORG_ID }}"
