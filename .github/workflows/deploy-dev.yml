name: Deploy — Dev

on:
  push:
    branches:
      - main

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  REGION: europe-west1
  IMAGE_API: europe-west1-docker.pkg.dev/${{ vars.GCP_PROJECT_ID }}/zeta/api
  IMAGE_DASHBOARD: europe-west1-docker.pkg.dev/${{ vars.GCP_PROJECT_ID }}/zeta/dashboard
  CLOUD_SQL_PROXY_VERSION: "2.14.2"
  MIGRATE_VERSION: "4.18.1"
  DEV_DASHBOARD_URL: https://app.dev.strido.net
  DEV_API_URL: https://api.dev.strido.net
  DEV_RESEND_FROM_EMAIL: notifications@strido.net
  DEV_DISCORD_FEEDBACK_FORUM_CHANNEL_ID: "1516505542258856137"
  DEV_DISCORD_MODERATION_REPORTS_FORUM_CHANNEL_ID: "1523004466973114569"
  DEV_INBOUND_EMAIL_SOCIAL_ADDRESS: social-dev@strido.net
  DEV_INBOUND_EMAIL_SUPPORT_ADDRESS: support-dev@strido.net
  DEV_INBOUND_EMAIL_DSA_ADDRESS: dsa-dev@strido.net
  DEV_DISCORD_SOCIAL_INBOX_FORUM_CHANNEL_ID: "1516917231060127854"
  DEV_DISCORD_SUPPORT_INBOX_FORUM_CHANNEL_ID: "1516917824587698295"
  DEV_DISCORD_DSA_INBOX_FORUM_CHANNEL_ID: "1516918104880447529"
  INBOUND_EMAIL_COPY_RECIPIENTS: pashalobaryev111@gmail.com
  DISCORD_APPLICATION_ID: "1516495868608385105"
  DISCORD_PUBLIC_KEY: "343214aae17ab4e203b5f60b2680552dd1b51fe21d8b9f8193213161ad19bdfe"

jobs:
  build-and-deploy-api:
    name: Build & Deploy API to Dev
    runs-on: ubuntu-latest
    environment: dev
    permissions:
      contents: read
      id-token: write

    steps:
      - uses: actions/checkout@v7

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v3
        with:
          workload_identity_provider: ${{ secrets.GCP_WIF_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker ${{ env.REGION }}-docker.pkg.dev --quiet

      - name: Run database migrations
        env:
          CLOUD_SQL_INSTANCE: ${{ vars.GCP_PROJECT_ID }}:${{ env.REGION }}:zeta-dev
          SECRET_ID: zeta-dev-db-url
          GCP_PROJECT_ID: ${{ vars.GCP_PROJECT_ID }}
        run: |
          set -euo pipefail

          # Install Cloud SQL Auth Proxy
          curl -fsSL "https://storage.googleapis.com/cloud-sql-connectors/cloud-sql-proxy/v${CLOUD_SQL_PROXY_VERSION}/cloud-sql-proxy.linux.amd64" \
            -o /tmp/cloud-sql-proxy && chmod +x /tmp/cloud-sql-proxy

          # Install golang-migrate
          curl -fsSL "https://github.com/golang-migrate/migrate/releases/download/v${MIGRATE_VERSION}/migrate.linux-amd64.tar.gz" \
            | tar xz -C /tmp migrate && chmod +x /tmp/migrate

          # Start proxy and ensure it is killed on exit
          /tmp/cloud-sql-proxy --port=5432 "${CLOUD_SQL_INSTANCE}" &
          PROXY_PID=$!
          trap 'kill "$PROXY_PID" 2>/dev/null || true' EXIT

          # Wait for proxy to be ready (up to 15 s)
          echo "Waiting for Cloud SQL Auth Proxy..."
          for i in $(seq 1 15); do
            if nc -z 127.0.0.1 5432 2>/dev/null; then
              echo "Proxy is ready."
              break
            fi
            if [ "$i" -eq 15 ]; then
              echo "Proxy failed to start in time." && exit 1
            fi
            sleep 1
          done

          # Retrieve DB URL from Secret Manager and mask it in logs
          DB_URL_SOCKET=$(gcloud secrets versions access latest \
            --secret="${SECRET_ID}" --project="${GCP_PROJECT_ID}")
          echo "::add-mask::$DB_URL_SOCKET"

          # Transform Unix socket URL → TCP URL for the proxy
          # From: postgres://user:pass@/dbname?host=/cloudsql/instance&sslmode=disable
          # To:   postgres://user:pass@localhost:5432/dbname?sslmode=disable
          MIGRATION_URL=$(echo "$DB_URL_SOCKET" \
            | sed 's|@/|@localhost:5432/|; s|?host=[^&]*&|?|')
          echo "::add-mask::$MIGRATION_URL"

          # Run pending migrations
          /tmp/migrate -path db/migrations -database "$MIGRATION_URL" up

      - name: Build and push image
        run: |
          IMAGE_TAG="${{ env.IMAGE_API }}:${{ github.sha }}"
          docker build -t "$IMAGE_TAG" -t "${{ env.IMAGE_API }}:latest" .
          docker push "$IMAGE_TAG"
          docker push "${{ env.IMAGE_API }}:latest"

      - name: Remove legacy Agora recording secret bindings
        run: |
          gcloud run services update zeta-api-dev \
            --region ${{ env.REGION }} \
            --project ${{ vars.GCP_PROJECT_ID }} \
            --remove-secrets="AGORA_CLOUD_RECORDING_ENABLED,AGORA_CLOUD_RECORDING_BASE_URL,AGORA_RECORDING_MODE,AGORA_RECORDING_STORAGE_VENDOR,AGORA_RECORDING_STORAGE_REGION,AGORA_RECORDING_STORAGE_BUCKET,AGORA_RECORDING_FILE_PREFIX,AGORA_RECORDING_MAX_IDLE_TIME,AGORA_RECORDING_TRANSCODING_WIDTH,AGORA_RECORDING_TRANSCODING_HEIGHT,AGORA_RECORDING_TRANSCODING_BITRATE,AGORA_RECORDING_TRANSCODING_FPS"

      - name: Deploy to Cloud Run
        run: |
          gcloud run deploy zeta-api-dev \
            --image "${{ env.IMAGE_API }}:${{ github.sha }}" \
            --region ${{ env.REGION }} \
            --project ${{ vars.GCP_PROJECT_ID }} \
            --platform managed \
            --allow-unauthenticated \
            --add-cloudsql-instances=${{ vars.GCP_PROJECT_ID }}:${{ env.REGION }}:zeta-dev \
            --set-secrets="DB_URL=zeta-dev-db-url:latest,WORKOS_API_KEY=zeta-dev-workos-api-key:latest,WORKOS_CLIENT_ID=zeta-dev-workos-client-id:latest,MUX_TOKEN_ID=zeta-dev-mux-token-id:latest,MUX_TOKEN_SECRET=zeta-dev-mux-token-secret:latest,RESEND_API_KEY=zeta-dev-resend-api-key:latest,RESEND_WEBHOOK_SIGNING_SECRET=zeta-dev-resend-webhook-signing-secret:latest,OPENROUTER_API_KEY=zeta-dev-openrouter-api-key:latest,DEFAULT_ORG_ID=zeta-dev-default-org-id:latest,AGORA_APP_ID=zeta-dev-agora-app-id:latest,AGORA_APP_CERTIFICATE=zeta-dev-agora-app-certificate:latest,SCHEDULER_SECRET=zeta-dev-scheduler-secret:latest,AGORA_REST_CUSTOMER_ID=zeta-dev-agora-rest-customer-id:latest,AGORA_REST_CUSTOMER_SECRET=zeta-dev-agora-rest-customer-secret:latest,AGORA_RECORDING_STORAGE_ACCESS_KEY=zeta-dev-agora-recording-storage-access-key:latest,AGORA_RECORDING_STORAGE_SECRET_KEY=zeta-dev-agora-recording-storage-secret-key:latest,DISCORD_BOT_TOKEN=zeta-dev-discord-bot-token:latest" \
            --set-env-vars="ENV=dev,GCP_PROJECT_ID=${{ vars.GCP_PROJECT_ID }},LOG_LEVEL=debug,DEFAULT_LANGUAGE=en,RESEND_FROM_EMAIL=${{ env.DEV_RESEND_FROM_EMAIL }},ALLOWED_ORIGINS=${{ env.DEV_DASHBOARD_URL }},FRONTEND_URL=${{ env.DEV_DASHBOARD_URL }},WORKOS_REDIRECT_URI=${{ env.DEV_API_URL }}/auth/callback,MIN_BOOKING_NOTICE=0s,CANCELLATION_NOTICE=0s,CONNECT_WINDOW=24h,DISCORD_FEEDBACK_FORUM_CHANNEL_ID=${{ env.DEV_DISCORD_FEEDBACK_FORUM_CHANNEL_ID }},DISCORD_MODERATION_REPORTS_FORUM_CHANNEL_ID=${{ env.DEV_DISCORD_MODERATION_REPORTS_FORUM_CHANNEL_ID }},INBOUND_EMAIL_SOCIAL_ADDRESS=${{ env.DEV_INBOUND_EMAIL_SOCIAL_ADDRESS }},INBOUND_EMAIL_SUPPORT_ADDRESS=${{ env.DEV_INBOUND_EMAIL_SUPPORT_ADDRESS }},INBOUND_EMAIL_DSA_ADDRESS=${{ env.DEV_INBOUND_EMAIL_DSA_ADDRESS }},DISCORD_SOCIAL_INBOX_FORUM_CHANNEL_ID=${{ env.DEV_DISCORD_SOCIAL_INBOX_FORUM_CHANNEL_ID }},DISCORD_SUPPORT_INBOX_FORUM_CHANNEL_ID=${{ env.DEV_DISCORD_SUPPORT_INBOX_FORUM_CHANNEL_ID }},DISCORD_DSA_INBOX_FORUM_CHANNEL_ID=${{ env.DEV_DISCORD_DSA_INBOX_FORUM_CHANNEL_ID }},INBOUND_EMAIL_COPY_RECIPIENTS=${{ env.INBOUND_EMAIL_COPY_RECIPIENTS }},DISCORD_APPLICATION_ID=${{ env.DISCORD_APPLICATION_ID }},DISCORD_PUBLIC_KEY=${{ env.DISCORD_PUBLIC_KEY }},AGORA_CLOUD_RECORDING_ENABLED=true,AGORA_CLOUD_RECORDING_BASE_URL=https://api.sd-rtn.com,AGORA_RECORDING_MODE=web,AGORA_RECORDING_STORAGE_VENDOR=6,AGORA_RECORDING_STORAGE_REGION=0,AGORA_RECORDING_FILE_PREFIX=liveCoachingRecordings,AGORA_RECORDING_MAX_IDLE_TIME=60,AGORA_RECORDING_TRANSCODING_WIDTH=1280,AGORA_RECORDING_TRANSCODING_HEIGHT=720,AGORA_RECORDING_TRANSCODING_BITRATE=1800,AGORA_RECORDING_TRANSCODING_FPS=30,AGORA_RECORDING_PRESENCE_TTL=30s,AGORA_RECORDING_EMPTY_GRACE=60s,AGORA_RECORDING_END_GRACE=15m,AGORA_RECORDING_STORAGE_BUCKET=${{ vars.GCP_PROJECT_ID }}-zeta-dev-coaching-recordings"

  build-and-deploy-dashboard:
    name: Build & Deploy Dashboard to Dev
    runs-on: ubuntu-latest
    environment: dev
    permissions:
      contents: read
      id-token: write

    steps:
      - uses: actions/checkout@v7

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v3
        with:
          workload_identity_provider: ${{ secrets.GCP_WIF_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker ${{ env.REGION }}-docker.pkg.dev --quiet

      - name: Build and push image
        working-directory: web/dashboard-next
        run: |
          IMAGE_TAG="${{ env.IMAGE_DASHBOARD }}:${{ github.sha }}"
          docker build -t "$IMAGE_TAG" -t "${{ env.IMAGE_DASHBOARD }}:latest" .
          docker push "$IMAGE_TAG"
          docker push "${{ env.IMAGE_DASHBOARD }}:latest"

      - name: Deploy to Cloud Run
        run: |
          gcloud run deploy zeta-dashboard-dev \
            --image "${{ env.IMAGE_DASHBOARD }}:${{ github.sha }}" \
            --region ${{ env.REGION }} \
            --project ${{ vars.GCP_PROJECT_ID }} \
            --platform managed \
            --allow-unauthenticated \
            --set-env-vars="API_URL=${{ env.DEV_API_URL }}"
