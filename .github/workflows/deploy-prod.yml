name: Deploy — Prod

on:
  push:
    tags:
      - "v*"

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  REGION: europe-west1
  IMAGE_API: europe-west1-docker.pkg.dev/${{ vars.GCP_PROJECT_ID }}/zeta/api
  IMAGE_DASHBOARD: europe-west1-docker.pkg.dev/${{ vars.GCP_PROJECT_ID }}/zeta/dashboard
  CLOUD_SQL_PROXY_VERSION: "2.14.2"
  MIGRATE_VERSION: "4.18.1"

jobs:
  build-and-deploy-api:
    name: Build & Deploy API to Prod
    runs-on: ubuntu-latest
    environment: prod
    permissions:
      contents: read
      id-token: write

    steps:
      - uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WIF_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker ${{ env.REGION }}-docker.pkg.dev --quiet

      - name: Run database migrations
        env:
          CLOUD_SQL_INSTANCE: ${{ vars.GCP_PROJECT_ID }}:${{ env.REGION }}:zeta-prod
          SECRET_ID: zeta-prod-db-url
          GCP_PROJECT_ID: ${{ vars.GCP_PROJECT_ID }}
        run: |
          set -euo pipefail

          # Install Cloud SQL Auth Proxy
          curl -fsSL "https://storage.googleapis.com/cloud-sql-connectors/cloud-sql-proxy/v${CLOUD_SQL_PROXY_VERSION}/cloud-sql-proxy.linux.amd64" \
            -o /tmp/cloud-sql-proxy && chmod +x /tmp/cloud-sql-proxy

          # Install golang-migrate
          curl -fsSL "https://github.com/golang-migrate/migrate/releases/download/v${MIGRATE_VERSION}/migrate.linux-amd64.tar.gz" \
            | tar xz -C /tmp migrate && chmod +x /tmp/migrate

          # Start proxy and ensure it is killed on exit
          /tmp/cloud-sql-proxy --port=5432 "${CLOUD_SQL_INSTANCE}" &
          PROXY_PID=$!
          trap 'kill "$PROXY_PID" 2>/dev/null || true' EXIT

          # Wait for proxy to be ready (up to 15 s)
          echo "Waiting for Cloud SQL Auth Proxy..."
          for i in $(seq 1 15); do
            if nc -z 127.0.0.1 5432 2>/dev/null; then
              echo "Proxy is ready."
              break
            fi
            if [ "$i" -eq 15 ]; then
              echo "Proxy failed to start in time." && exit 1
            fi
            sleep 1
          done

          # Retrieve DB URL from Secret Manager and mask it in logs
          DB_URL_SOCKET=$(gcloud secrets versions access latest \
            --secret="${SECRET_ID}" --project="${GCP_PROJECT_ID}")
          echo "::add-mask::$DB_URL_SOCKET"

          # Transform Unix socket URL → TCP URL for the proxy
          # From: postgres://user:pass@/dbname?host=/cloudsql/instance&sslmode=disable
          # To:   postgres://user:pass@localhost:5432/dbname?sslmode=disable
          MIGRATION_URL=$(echo "$DB_URL_SOCKET" \
            | sed 's|@/|@localhost:5432/|; s|?host=[^&]*&|?|')
          echo "::add-mask::$MIGRATION_URL"

          # Run pending migrations
          /tmp/migrate -path db/migrations -database "$MIGRATION_URL" up

      - name: Build and push image
        run: |
          IMAGE_TAG="${{ env.IMAGE_API }}:${{ github.ref_name }}"
          docker build -t "$IMAGE_TAG" -t "${{ env.IMAGE_API }}:stable" .
          docker push "$IMAGE_TAG"
          docker push "${{ env.IMAGE_API }}:stable"

      - name: Deploy to Cloud Run
        run: |
          gcloud run deploy zeta-api \
            --image "${{ env.IMAGE_API }}:${{ github.ref_name }}" \
            --region ${{ env.REGION }} \
            --project ${{ vars.GCP_PROJECT_ID }} \
            --platform managed \
            --allow-unauthenticated \
            --add-cloudsql-instances=${{ vars.GCP_PROJECT_ID }}:${{ env.REGION }}:zeta-prod \
            --set-secrets="DB_URL=zeta-prod-db-url:latest,WORKOS_API_KEY=zeta-prod-workos-api-key:latest,WORKOS_CLIENT_ID=zeta-prod-workos-client-id:latest,WORKOS_COOKIE_SECRET=zeta-prod-workos-cookie-secret:latest,MUX_TOKEN_ID=zeta-prod-mux-token-id:latest,MUX_TOKEN_SECRET=zeta-prod-mux-token-secret:latest,RESEND_API_KEY=zeta-prod-resend-api-key:latest,OPENROUTER_API_KEY=zeta-prod-openrouter-api-key:latest,DEFAULT_ORG_ID=zeta-prod-default-org-id:latest,AGORA_APP_ID=zeta-prod-agora-app-id:latest,AGORA_APP_CERTIFICATE=zeta-prod-agora-app-certificate:latest,SCHEDULER_SECRET=zeta-prod-scheduler-secret:latest" \
            --set-env-vars="ENV=prod,LOG_LEVEL=info,DEFAULT_LANGUAGE=en,ALLOWED_ORIGINS=https://${{ vars.CLOUD_RUN_PROD_DASHBOARD_URL }},FRONTEND_URL=https://${{ vars.CLOUD_RUN_PROD_DASHBOARD_URL }},WORKOS_REDIRECT_URI=https://${{ vars.CLOUD_RUN_PROD_URL }}/auth/callback"

  build-and-deploy-dashboard:
    name: Build & Deploy Dashboard to Prod
    runs-on: ubuntu-latest
    environment: prod
    permissions:
      contents: read
      id-token: write

    steps:
      - uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WIF_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker ${{ env.REGION }}-docker.pkg.dev --quiet

      - name: Build and push image
        working-directory: web/dashboard
        run: |
          IMAGE_TAG="${{ env.IMAGE_DASHBOARD }}:${{ github.ref_name }}"
          docker build -t "$IMAGE_TAG" -t "${{ env.IMAGE_DASHBOARD }}:stable" .
          docker push "$IMAGE_TAG"
          docker push "${{ env.IMAGE_DASHBOARD }}:stable"

      - name: Deploy to Cloud Run
        run: |
          gcloud run deploy zeta-dashboard \
            --image "${{ env.IMAGE_DASHBOARD }}:${{ github.ref_name }}" \
            --region ${{ env.REGION }} \
            --project ${{ vars.GCP_PROJECT_ID }} \
            --platform managed \
            --allow-unauthenticated \
            --set-env-vars="API_URL=https://${{ vars.CLOUD_RUN_PROD_URL }}"
