name: Deploy — Prod

on:
  push:
    tags:
      - "v*"

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  REGION: europe-west1
  IMAGE_API: europe-west1-docker.pkg.dev/${{ vars.GCP_PROJECT_ID }}/zeta/api
  IMAGE_DASHBOARD: europe-west1-docker.pkg.dev/${{ vars.GCP_PROJECT_ID }}/zeta/dashboard

jobs:
  build-and-deploy-api:
    name: Build & Deploy API to Prod
    runs-on: ubuntu-latest
    environment: prod
    permissions:
      contents: read
      id-token: write

    steps:
      - uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WIF_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker ${{ env.REGION }}-docker.pkg.dev --quiet

      - name: Build and push image
        run: |
          IMAGE_TAG="${{ env.IMAGE_API }}:${{ github.ref_name }}"
          docker build -t "$IMAGE_TAG" -t "${{ env.IMAGE_API }}:stable" .
          docker push "$IMAGE_TAG"
          docker push "${{ env.IMAGE_API }}:stable"

      - name: Deploy to Cloud Run
        run: |
          gcloud run deploy zeta-api \
            --image "${{ env.IMAGE_API }}:${{ github.ref_name }}" \
            --region ${{ env.REGION }} \
            --project ${{ vars.GCP_PROJECT_ID }} \
            --platform managed \
            --allow-unauthenticated \
            --add-cloudsql-instances=${{ vars.GCP_PROJECT_ID }}:${{ env.REGION }}:zeta-prod \
            --set-secrets="DB_URL=zeta-prod-db-url:latest,WORKOS_API_KEY=zeta-prod-workos-api-key:latest,WORKOS_CLIENT_ID=zeta-prod-workos-client-id:latest,WORKOS_COOKIE_SECRET=zeta-prod-workos-cookie-secret:latest,MUX_TOKEN_ID=zeta-prod-mux-token-id:latest,MUX_TOKEN_SECRET=zeta-prod-mux-token-secret:latest,RESEND_API_KEY=zeta-prod-resend-api-key:latest,OPENROUTER_API_KEY=zeta-prod-openrouter-api-key:latest" \
            --set-env-vars="ENV=prod,LOG_LEVEL=info,DEFAULT_LANGUAGE=en,ALLOWED_ORIGINS=https://${{ vars.CLOUD_RUN_PROD_DASHBOARD_URL }},FRONTEND_URL=https://${{ vars.CLOUD_RUN_PROD_DASHBOARD_URL }},WORKOS_REDIRECT_URI=https://${{ vars.CLOUD_RUN_PROD_URL }}/auth/callback,DEFAULT_ORG_ID=${{ vars.WORKOS_PROD_DEFAULT_ORG_ID }}"

  build-and-deploy-dashboard:
    name: Build & Deploy Dashboard to Prod
    runs-on: ubuntu-latest
    environment: prod
    permissions:
      contents: read
      id-token: write

    steps:
      - uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WIF_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker ${{ env.REGION }}-docker.pkg.dev --quiet

      - name: Build and push image
        working-directory: web/dashboard
        run: |
          IMAGE_TAG="${{ env.IMAGE_DASHBOARD }}:${{ github.ref_name }}"
          docker build -t "$IMAGE_TAG" -t "${{ env.IMAGE_DASHBOARD }}:stable" .
          docker push "$IMAGE_TAG"
          docker push "${{ env.IMAGE_DASHBOARD }}:stable"

      - name: Deploy to Cloud Run
        run: |
          gcloud run deploy zeta-dashboard \
            --image "${{ env.IMAGE_DASHBOARD }}:${{ github.ref_name }}" \
            --region ${{ env.REGION }} \
            --project ${{ vars.GCP_PROJECT_ID }} \
            --platform managed \
            --allow-unauthenticated \
            --set-env-vars="API_URL=https://${{ vars.CLOUD_RUN_PROD_URL }}"
